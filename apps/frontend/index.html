<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shelby Realty Video Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface-2: #1c1c26;
      --border: #2a2a3a;
      --text: #e8e8f0;
      --text-muted: #8888a0;
      --accent-blue: #3b82f6;
      --accent-gold: #f59e0b;
      --accent-purple: #8b5cf6;
      --accent-red: #ef4444;
      --accent-gray: #6b7280;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* --- Header / Branding --- */
    .header {
      width: 100%;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .header-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .header-icon svg { width: 20px; height: 20px; fill: #fff; }
    .header h1 {
      font-size: 18px; font-weight: 700; letter-spacing: -0.3px;
    }

    /* --- Main content --- */
    .main {
      flex: 1;
      width: 100%;
      max-width: 560px;
      padding: 48px 24px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero-title {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -1.2px;
      text-align: center;
      line-height: 1.15;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #fff 40%, #8888a0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero-sub {
      font-size: 16px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 40px;
    }

    /* --- Template pills --- */
    .template-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 28px;
    }
    .template-pill {
      padding: 8px 18px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s ease;
      background: var(--surface-2);
      color: var(--text-muted);
    }
    .template-pill:hover { background: var(--surface); }
    .template-pill[data-template="new_listing"].active {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      background: rgba(59, 130, 246, 0.1);
    }
    .template-pill[data-template="price_update"].active {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
      background: rgba(245, 158, 11, 0.1);
    }
    .template-pill[data-template="under_contract"].active {
      border-color: var(--accent-purple);
      color: var(--accent-purple);
      background: rgba(139, 92, 246, 0.1);
    }
    .template-pill[data-template="sold"].active {
      border-color: var(--accent-red);
      color: var(--accent-red);
      background: rgba(239, 68, 68, 0.1);
    }
    .template-pill[data-template="blank"].active {
      border-color: var(--accent-gray);
      color: var(--accent-gray);
      background: rgba(107, 114, 128, 0.1);
    }

    /* --- Input group --- */
    .input-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 12px;
    }
    .url-input {
      width: 100%;
      padding: 14px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .url-input::placeholder { color: var(--text-muted); }
    .url-input:focus { border-color: var(--accent-blue); }

    .generate-btn {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius);
      border: none;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #fff;
    }
    .generate-btn.blue { background: var(--accent-blue); }
    .generate-btn.gold { background: var(--accent-gold); color: #1a1a1a; }
    .generate-btn.purple { background: var(--accent-purple); }
    .generate-btn.red { background: var(--accent-red); }
    .generate-btn.gray { background: var(--accent-gray); }
    .generate-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .generate-btn:active { transform: translateY(0); }
    .generate-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* --- Status area --- */
    .status-area {
      width: 100%;
      margin-top: 28px;
      display: none;
    }
    .status-area.visible { display: block; }

    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .status-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent-blue);
      animation: pulse 1.5s ease-in-out infinite;
    }
    .status-dot.done { background: #22c55e; animation: none; }
    .status-dot.error { background: var(--accent-red); animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .status-label {
      font-size: 14px; font-weight: 600;
    }

    .progress-bar-track {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: var(--surface-2);
      overflow: hidden;
      margin-bottom: 10px;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--accent-blue);
      transition: width 0.4s ease;
      width: 0%;
    }
    .progress-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    .error-msg {
      margin-top: 12px;
      padding: 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      font-size: 13px;
      color: #fca5a5;
    }

    /* --- Video result --- */
    .video-container {
      width: 100%;
      margin-top: 20px;
      display: none;
    }
    .video-container.visible { display: block; }

    .video-wrapper {
      width: 100%;
      max-width: 320px;
      margin: 0 auto;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
    }
    .video-wrapper video {
      width: 100%;
      display: block;
    }

    .download-btn {
      display: block;
      width: 100%;
      max-width: 320px;
      margin: 16px auto 0;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.2s;
    }
    .download-btn:hover { background: var(--surface-2); }

    /* --- Footer --- */
    .footer {
      width: 100%;
      padding: 20px 32px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M4 8l8-5 8 5v10l-8 5-8-5V8z"/><path d="M12 3v18" stroke="#fff" stroke-width="1.5" fill="none"/></svg>
    </div>
    <h1>Shelby Video Generator</h1>
  </div>

  <div class="main">
    <h2 class="hero-title">Listing videos,<br/>instantly.</h2>
    <p class="hero-sub">Paste a Shelby Realty IDX listing URL and generate a branded 9:16 Facebook Reel in under two minutes.</p>

    <!-- Template selector -->
    <div class="template-row">
      <button class="template-pill active" data-template="new_listing">New Listing</button>
      <button class="template-pill" data-template="price_update">Price Update</button>
      <button class="template-pill" data-template="under_contract">Under Contract</button>
      <button class="template-pill" data-template="sold">Sold</button>
      <button class="template-pill" data-template="blank">Blank</button>
    </div>

    <!-- Input + generate -->
    <div class="input-group">
      <input
        type="url"
        class="url-input"
        id="urlInput"
        placeholder="https://www.shelbyrealty.com/idx/listing/..."
        autocomplete="off"
      />
      <button class="generate-btn blue" id="generateBtn">Generate Video</button>
    </div>

    <!-- Status -->
    <div class="status-area" id="statusArea">
      <div class="status-card">
        <div class="status-header">
          <div class="status-dot" id="statusDot"></div>
          <span class="status-label" id="statusLabel">Processing…</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">Starting…</div>
        <div class="error-msg" id="errorMsg" style="display:none"></div>
      </div>
    </div>

    <!-- Video result -->
    <div class="video-container" id="videoContainer">
      <div class="video-wrapper">
        <video id="videoPlayer" controls playsinline></video>
      </div>
      <a class="download-btn" id="downloadBtn" download>Download Video</a>
    </div>
  </div>

  <div class="footer">Shelby Realty Services &middot; Video Generator</div>

<script>
const API_BASE = "https://property-video-generator.onrender.com";

const pills = document.querySelectorAll(".template-pill");
const urlInput = document.getElementById("urlInput");
const generateBtn = document.getElementById("generateBtn");
const statusArea = document.getElementById("statusArea");
const statusDot = document.getElementById("statusDot");
const statusLabel = document.getElementById("statusLabel");
const progressFill = document.getElementById("progressFill");
const progressText = document.getElementById("progressText");
const errorMsg = document.getElementById("errorMsg");
const videoContainer = document.getElementById("videoContainer");
const videoPlayer = document.getElementById("videoPlayer");
const downloadBtn = document.getElementById("downloadBtn");

let selectedTemplate = "new_listing";
let pollTimer = null;

const btnColorMap = {
  new_listing: "blue",
  price_update: "gold",
  under_contract: "purple",
  sold: "red",
  blank: "gray",
};

const accentColorMap = {
  new_listing: "var(--accent-blue)",
  price_update: "var(--accent-gold)",
  under_contract: "var(--accent-purple)",
  sold: "var(--accent-red)",
  blank: "var(--accent-gray)",
};

// Template selection
pills.forEach(pill => {
  pill.addEventListener("click", () => {
    pills.forEach(p => p.classList.remove("active"));
    pill.classList.add("active");
    selectedTemplate = pill.dataset.template;
    // Update button color
    generateBtn.className = "generate-btn " + (btnColorMap[selectedTemplate] || "blue");
  });
});

// Generate
generateBtn.addEventListener("click", async () => {
  const url = urlInput.value.trim();
  if (!url) { urlInput.focus(); return; }

  generateBtn.disabled = true;
  videoContainer.classList.remove("visible");
  errorMsg.style.display = "none";
  statusArea.classList.add("visible");
  statusDot.className = "status-dot";
  statusLabel.textContent = "Submitting…";
  progressFill.style.width = "0%";
  progressFill.style.background = accentColorMap[selectedTemplate] || "var(--accent-blue)";
  progressText.textContent = "Starting…";

  try {
    const res = await fetch(`${API_BASE}/generate`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url, template: selectedTemplate }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: "Server error" }));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const jobId = data.job_id;
    statusLabel.textContent = "Processing…";
    progressText.textContent = `Job ${jobId.slice(0, 8)}… — starting pipeline`;
    startPolling(jobId);
  } catch (e) {
    showError(e.message);
  }
});

function startPolling(jobId) {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => pollJob(jobId), 3000);
  pollJob(jobId);
}

async function pollJob(jobId) {
  try {
    const res = await fetch(`${API_BASE}/jobs/${jobId}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const pct = data.progress || 0;
    progressFill.style.width = pct + "%";

    const statusMap = {
      5: "Scraping listing…",
      15: "Downloading images…",
      28: "Processing images…",
      40: "Rendering scenes…",
      55: "Compositing frames…",
      70: "Encoding video…",
      85: "Uploading…",
      95: "Finalizing…",
    };
    let label = "Processing…";
    for (const [threshold, text] of Object.entries(statusMap).reverse()) {
      if (pct >= Number(threshold)) { label = text; break; }
    }
    progressText.textContent = `${pct}% — ${label}`;

    if (data.status === "completed" && data.videoUrl) {
      clearInterval(pollTimer);
      pollTimer = null;
      statusDot.classList.add("done");
      statusLabel.textContent = "Complete!";
      progressFill.style.width = "100%";
      progressText.textContent = "100% — Video ready";
      showVideo(data.videoUrl);
      generateBtn.disabled = false;
    } else if (data.status === "failed") {
      clearInterval(pollTimer);
      pollTimer = null;
      showError(data.errorMessage || "Video generation failed");
      generateBtn.disabled = false;
    }
  } catch (e) {
    // Network blip — keep polling
  }
}

function showVideo(url) {
  videoPlayer.src = url;
  downloadBtn.href = url;
  videoContainer.classList.add("visible");
}

function showError(msg) {
  statusDot.classList.add("error");
  statusLabel.textContent = "Failed";
  errorMsg.textContent = msg;
  errorMsg.style.display = "block";
  generateBtn.disabled = false;
}
</script>
</body>
</html>
